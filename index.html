<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda Telefônica</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#eef2f7;margin:0;padding:20px}
.container{max-width:1100px;margin:auto;background:#fff;padding:24px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
h1{text-align:center;color:#0f4c81}
h2{color:#0f4c81;margin-bottom:5px}
.desc{font-size:13px;color:#555;margin-bottom:10px}

input,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;margin-top:5px}
textarea{min-height:80px}

button{padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
.add{background:green;color:white}
.edit{background:#0d6efd;color:white}
.del{background:red;color:white}
.cancel{background:#6c757d;color:white}
.whats{background:#25d366;color:white}

.actions{margin-top:10px;display:flex;gap:10px;flex-wrap:wrap}

table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}

.status{margin:10px 0;padding:10px;border-radius:8px}
.ok{background:#d4edda;color:#155724}
.erro{background:#f8d7da;color:#721c24}

.card{background:#f8fbff;border:1px solid #d9e7f5;padding:16px;border-radius:12px;margin-bottom:20px}

.obs{white-space:pre-wrap}
</style>
</head>

<body>

<div class="container">
<h1>📞 Agenda Telefônica</h1>

<div id="status"></div>

<div class="card">
<h2 id="titulo">Novo contato</h2>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<textarea id="obs" placeholder="Observações"></textarea>

<div class="actions">
<button id="btnSalvar" class="add" onclick="salvar()">Adicionar contato</button>
<button id="btnCancelar" class="cancel" onclick="cancelar()" style="display:none;">Cancelar</button>
</div>
</div>

<div class="card">
<h2>🔎 Buscar contatos</h2>
<div class="desc">Digite nome, telefone ou qualquer informação para encontrar rapidamente um contato.</div>

<input id="busca" placeholder="Ex: João, 5199..., cliente..." oninput="render()">
</div>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Telefone</th>
<th>Observações</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

</div>

<script>
const BIN="69cb0541856a682189e3aded";
const KEY="$2a$10$JGOrwpp/ZdlRDguC9i6pm.V/tOGv7eil4J4dKWGt5y7DBJEa3HvOi";

let contatos=[];
let editando=null;

function msg(t,tipo="ok"){
document.getElementById("status").innerHTML=`<div class="${tipo}">${t}</div>`;
}

function limparNumero(num){
return num.replace(/\D/g,'');
}

function abrirWhats(telefone){
let num=limparNumero(telefone);
window.open(`https://wa.me/55${num}`, '_blank');
}

async function load(){
let r=await fetch(`https://api.jsonbin.io/v3/b/${BIN}?meta=false`,{
headers:{"X-Access-Key":KEY}
});
let d=await r.json();
contatos=d.contatos||[];
render();
}

async function saveBin(){
await fetch(`https://api.jsonbin.io/v3/b/${BIN}`,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Access-Key":KEY
},
body:JSON.stringify({contatos})
});
}

async function salvar(){
let nome=document.getElementById("nome").value.trim();
let tel=document.getElementById("telefone").value.trim();
let obs=document.getElementById("obs").value.trim();

if(!nome||!tel){msg("Preencha nome e telefone","erro");return;}

if(editando===null){
contatos.push({nome,telefone:tel,observacoes:obs});
msg("Contato adicionado");
}else{
contatos[editando]={nome,telefone:tel,observacoes:obs};
msg("Contato atualizado");
}

await saveBin();
cancelar();
render();
}

function editar(i){
let c=contatos[i];
document.getElementById("nome").value=c.nome;
document.getElementById("telefone").value=c.telefone;
document.getElementById("obs").value=c.observacoes||"";

editando=i;

document.getElementById("titulo").innerText="Editar contato";
document.getElementById("btnSalvar").innerText="Salvar";
document.getElementById("btnSalvar").className="edit";
document.getElementById("btnCancelar").style.display="inline-block";

window.scrollTo(0,0);
}

function cancelar(){
editando=null;
document.getElementById("nome").value="";
document.getElementById("telefone").value="";
document.getElementById("obs").value="";
document.getElementById("titulo").innerText="Novo contato";
document.getElementById("btnSalvar").innerText="Adicionar contato";
document.getElementById("btnSalvar").className="add";
document.getElementById("btnCancelar").style.display="none";
}

async function excluir(i){
if(!confirm("Excluir contato?"))return;
contatos.splice(i,1);
await saveBin();
render();
}

function render(){
let b=document.getElementById("busca").value.toLowerCase();
let lista=document.getElementById("lista");
lista.innerHTML="";

contatos
.filter(c=>c.nome.toLowerCase().includes(b)||c.telefone.includes(b)||(c.observacoes||"").toLowerCase().includes(b))
.sort((a,b)=>a.nome.localeCompare(b.nome))
.forEach((c,i)=>{
lista.innerHTML+=`
<tr>
<td>${c.nome}</td>
<td>${c.telefone}</td>
<td class="obs">${c.observacoes||""}</td>
<td>
<button class="whats" onclick="abrirWhats('${c.telefone}')">WhatsApp</button>
<button class="edit" onclick="editar(${i})">Editar</button>
<button class="del" onclick="excluir(${i})">Excluir</button>
</td>
</tr>`;
});
}

load();
</script>

</body>
</html>
