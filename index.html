<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ece5dd;
}

header {
  background: #075e54;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

#busca {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.lista {
  padding: 10px;
}

.contato {
  background: white;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.info {
  text-align: left;
}

.nome {
  font-weight: bold;
}

.tel {
  color: gray;
  font-size: 14px;
}

.obs {
  font-size: 12px;
  color: #555;
}

.user {
  font-size: 11px;
  color: #888;
}

.acoes {
  display: flex;
  gap: 5px;
}

.whats {
  background: #25d366;
  color: white;
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  cursor: pointer;
}

.delete {
  background: red;
  color: white;
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  cursor: pointer;
}

.add-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: white;
  border: none;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  font-size: 30px;
  cursor: pointer;
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  padding: 20px;
  margin: 80px auto;
  width: 90%;
  border-radius: 10px;
}

.modal input {
  width: 95%;
  padding: 10px;
  margin: 5px 0;
}
</style>
</head>

<body>

<header>📱 Agenda</header>

<input type="text" id="busca" placeholder="🔍 Buscar..." onkeyup="filtrar()">

<div class="lista" id="lista"></div>

<button class="add-btn" onclick="abrirModal()">+</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Novo Contato</h3>
    <input type="text" id="nome" placeholder="Nome">
    <input type="text" id="telefone" placeholder="DDD + Número">
    <input type="text" id="obs" placeholder="Observações">
    <input type="text" id="usuario" placeholder="Quem cadastrou">
    <button onclick="adicionar()">Salvar</button>
  </div>
</div>

<script>
let contatos = JSON.parse(localStorage.getItem("contatos")) || [];

function salvar() {
  localStorage.setItem("contatos", JSON.stringify(contatos));
}

function formatar(numero) {
  numero = numero.replace(/\D/g, '');
  if (numero.length === 11) {
    return numero.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
  } else if (numero.length === 10) {
    return numero.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
  }
  return numero;
}

function whatsapp(numero) {
  numero = numero.replace(/\D/g, '');
  return `https://wa.me/55${numero}`;
}

function render(lista = contatos) {
  let div = document.getElementById("lista");
  div.innerHTML = "";

  lista.forEach((c, index) => {
    let item = document.createElement("div");
    item.className = "contato";

    item.innerHTML = `
      <div class="info">
        <div class="nome">${c.nome}</div>
        <div class="tel">${formatar(c.telefone)}</div>
        <div class="obs">${c.obs || ""}</div>
        <div class="user">👤 ${c.usuario || "Não informado"}</div>
      </div>
      <div class="acoes">
        <button class="whats" onclick="window.open('${whatsapp(c.telefone)}')">💬</button>
        <button class="delete" onclick="excluir(${index})">🗑️</button>
      </div>
    `;

    div.appendChild(item);
  });
}

function adicionar() {
  let nome = document.getElementById("nome").value;
  let telefone = document.getElementById("telefone").value;
  let obs = document.getElementById("obs").value;
  let usuario = document.getElementById("usuario").value;

  if (!nome || !telefone) {
    alert("Preencha nome e telefone!");
    return;
  }

  contatos.push({ nome, telefone, obs, usuario });
  salvar();
  render();
  fecharModal();

  document.getElementById("nome").value = "";
  document.getElementById("telefone").value = "";
  document.getElementById("obs").value = "";
  document.getElementById("usuario").value = "";
}

function excluir(index) {
  if (confirm("Deseja excluir este contato?")) {
    contatos.splice(index, 1);
    salvar();
    render();
  }
}

function filtrar() {
  let busca = document.getElementById("busca").value.toLowerCase();

  let filtrados = contatos.filter(c =>
    c.nome.toLowerCase().includes(busca) ||
    (c.obs && c.obs.toLowerCase().includes(busca)) ||
    (c.usuario && c.usuario.toLowerCase().includes(busca)) ||
    c.telefone.includes(busca)
  );

  render(filtrados);
}

function abrirModal() {
  document.getElementById("modal").style.display = "block";
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}

render();
</script>

</body>
</html>
