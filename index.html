<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agenda Telefônica</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }
    h1 {
      background: #333;
      color: white;
      padding: 10px;
    }
    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }
    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
    table {
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
      width: 60%;
      background: white;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }
    th {
      background: #555;
      color: white;
    }
  </style>
</head>
<body>

<h1>📞 Agenda Telefônica</h1>

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="telefone" placeholder="Telefone">
<button onclick="adicionarContato()">Adicionar</button>

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
    </tr>
  </thead>
  <tbody id="lista"></tbody>
</table>

<script>
  function adicionarContato() {
    let nome = document.getElementById("nome").value;
    let telefone = document.getElementById("telefone").value;

    if(nome === "" || telefone === "") {
      alert("Preencha todos os campos!");
      return;
    }

    let tabela = document.getElementById("lista");
    let linha = tabela.insertRow();

    linha.insertCell(0).innerText = nome;
    linha.insertCell(1).innerText = telefone;

    document.getElementById("nome").value = "";
    document.getElementById("telefone").value = "";
  }
</script>

</body>
</html>
