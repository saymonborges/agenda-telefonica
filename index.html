<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Online</title>

<style>
body { margin:0; font-family: Arial; background:#ece5dd; }

header {
  background:#075e54;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

#busca {
  width:90%;
  margin:10px auto;
  padding:10px;
  border-radius:20px;
  border:none;
  display:block;
}

.lista { padding:10px; }

.contato {
  background:white;
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
}

.nome { font-weight:bold; }
.tel { color:gray; font-size:14px; }
.obs { font-size:12px; }
.user { font-size:11px; color:#777; }

button {
  border:none;
  border-radius:50%;
  width:40px;
  height:40px;
  color:white;
  cursor:pointer;
}

.whats { background:#25d366; }
.delete { background:red; }

.add-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#25d366;
  color:white;
  font-size:30px;
}

.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-content {
  background:white;
  margin:100px auto;
  padding:20px;
  width:90%;
  border-radius:10px;
}

.modal input {
  width:95%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<header>📱 Agenda Online</header>

<input id="busca" placeholder="🔍 Buscar..." onkeyup="filtrar()">

<div id="lista" class="lista"></div>

<button class="add-btn" onclick="abrirModal()">+</button>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Novo Contato</h3>
    <input id="nome" placeholder="Nome">
    <input id="telefone" placeholder="DDD + Número">
    <input id="obs" placeholder="Observações">
    <button onclick="adicionar()">Salvar</button>
  </div>
</div>

<script>
const API_KEY = "SUA_API_KEY_AQUI";
const BIN_ID = "69cb0541856a682189e3aded";

let contatos = [];

let usuario = localStorage.getItem("usuario") || prompt("Digite seu nome:");
localStorage.setItem("usuario", usuario);

/* CARREGAR */
async function carregar() {
  let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: { "X-Master-Key": API_KEY }
  });

  let data = await res.json();
  contatos = data.record.contatos || [];
  render(contatos);
}

/* SALVAR */
async function salvar() {
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify({ contatos })
  });
}

/* RENDER */
function render(lista) {
  let div = document.getElementById("lista");
  div.innerHTML = "";

  lista.forEach((c, i) => {
    div.innerHTML += `
      <div class="contato">
        <div>
          <div class="nome">${c.nome}</div>
          <div class="tel">${c.telefone}</div>
          <div class="obs">${c.obs || ""}</div>
          <div class="user">👤 ${c.usuario}</div>
        </div>
        <div>
          <button class="whats" onclick="window.open('https://wa.me/55${c.telefone}')">💬</button>
          <button class="delete" onclick="excluir(${i})">🗑️</button>
        </div>
      </div>
    `;
  });
}

/* ADICIONAR */
async function adicionar() {
  let nome = nomeEl.value;
  let telefone = telefoneEl.value;
  let obs = obsEl.value;

  if (!nome || !telefone) return alert("Preencha nome e telefone!");

  contatos.push({ nome, telefone, obs, usuario });

  await salvar();
  carregar();
  fecharModal();

  nomeEl.value = "";
  telefoneEl.value = "";
  obsEl.value = "";
}

/* EXCLUIR */
async function excluir(i) {
  if (!confirm("Excluir contato?")) return;
  contatos.splice(i, 1);
  await salvar();
  carregar();
}

/* BUSCA */
function filtrar() {
  let b = busca.value.toLowerCase();

  let f = contatos.filter(c =>
    c.nome.toLowerCase().includes(b) ||
    (c.obs && c.obs.toLowerCase().includes(b)) ||
    c.telefone.includes(b)
  );

  render(f);
}

/* MODAL */
function abrirModal() { modal.style.display = "block"; }
function fecharModal() { modal.style.display = "none"; }

const nomeEl = document.getElementById("nome");
const telefoneEl = document.getElementById("telefone");
const obsEl = document.getElementById("obs");
const busca = document.getElementById("busca");
const modal = document.getElementById("modal");

carregar();
</script>

</body>
</html>
