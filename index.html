<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agenda Telefônica</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    h1 {
      background: #2c3e50;
      color: white;
      padding: 15px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 180px;
    }

    button {
      padding: 10px;
      border: none;
      cursor: pointer;
      margin: 5px;
      background: green;
      color: white;
    }

    table {
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
      width: 90%;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }

    th {
      background: #34495e;
      color: white;
    }

    #busca {
      width: 300px;
      margin-top: 10px;
    }

    a {
      color: green;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>📞 Agenda Telefônica</h1>

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="telefone" placeholder="DDD + Número">
<input type="text" id="obs" placeholder="Observações">
<button onclick="adicionarContato()">Adicionar</button>

<br>

<input type="text" id="busca" placeholder="🔍 Buscar contato..." onkeyup="filtrar()">

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>Telefone</th>
      <th>Observações</th>
      <th>WhatsApp</th>
    </tr>
  </thead>
  <tbody id="lista"></tbody>
</table>

<script>
  let contatos = JSON.parse(localStorage.getItem("contatos")) || [];

  function salvar() {
    localStorage.setItem("contatos", JSON.stringify(contatos));
  }

  function formatarTelefone(numero) {
    numero = numero.replace(/\D/g, '');

    if (numero.length === 11) {
      return numero.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
    } else if (numero.length === 10) {
      return numero.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
    }
    return numero;
  }

  function gerarWhatsApp(numero) {
    numero = numero.replace(/\D/g, '');
    return `https://wa.me/55${numero}`;
  }

  function renderizar(lista = contatos) {
    let tabela = document.getElementById("lista");
    tabela.innerHTML = "";

    lista.forEach((contato) => {
      let linha = tabela.insertRow();

      linha.insertCell(0).innerText = contato.nome;
      linha.insertCell(1).innerText = formatarTelefone(contato.telefone);
      linha.insertCell(2).innerText = contato.obs;

      let link = document.createElement("a");
      link.href = gerarWhatsApp(contato.telefone);
      link.target = "_blank";
      link.innerText = "Abrir";

      let cell = linha.insertCell(3);
      cell.appendChild(link);
    });
  }

  function adicionarContato() {
    let nome = document.getElementById("nome").value;
    let telefone = document.getElementById("telefone").value;
    let obs = document.getElementById("obs").value;

    if (nome === "" || telefone === "") {
      alert("Preencha nome e telefone!");
      return;
    }

    contatos.push({ nome, telefone, obs });
    salvar();
    renderizar();

    document.getElementById("nome").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("obs").value = "";
  }

  function filtrar() {
    let busca = document.getElementById("busca").value.toLowerCase();

    let filtrados = contatos.filter(c =>
      c.nome.toLowerCase().includes(busca)
    );

    renderizar(filtrados);
  }

  renderizar();
</script>

</body>
</html>
